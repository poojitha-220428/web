<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startup Demo Website</title>
</head>
<body>

    <h1>Welcome to My Startup 🚀</h1>

    <!-- Task 4 -->
    <p id="text">This is original text</p>
    <button onclick="changeText()">Change Text</button>

    <!-- Task 5 -->
    <h2 id="styleText">Style Me</h2>
    <button onclick="changeStyle()">Change Style</button>

    <!-- Task 6 -->
    <div id="hoverBox" style="width:200px;height:100px;background:lightgray;">
        Hover Over Me
    </div>

    <!-- Task 7 -->
    <h3 id="greeting"></h3>
    <button onclick="askName()">Enter Name</button>

    <br><br>

    <!-- Form -->
    <form onsubmit="validateForm(event)">
        <input type="text" id="username" placeholder="Enter username">
        <button type="submit">Submit</button>
    </form>

    <br>

    <!-- Print Button -->
    <button onclick="printPage()">Print Page</button>

    <script src="script.js"></script>

</body>
</html>
